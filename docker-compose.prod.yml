services:
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000
    env_file: [.env.production]
    restart: unless-stopped
    depends_on: [db, redis]

  webhook:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: uvicorn apps.webhook.main:app --host 0.0.0.0 --port 8001
    env_file: [.env.production]
    restart: unless-stopped
    depends_on: [db, redis]

  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: python -m apps.worker.worker
    env_file: [.env.production]
    restart: unless-stopped
    depends_on: [db, redis]

  scheduler:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: python -m apps.scheduler.main
    env_file: [.env.production]
    restart: unless-stopped
    depends_on: [db, redis]

  admin-ui:
    build:
      context: ./apps/admin_ui
      dockerfile: Dockerfile
    restart: unless-stopped

  db:
    image: postgres:16
    env_file: [.env.production]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    restart: unless-stopped

  redis:
    image: redis:7
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on: [api, webhook, admin-ui]
    ports: ["80:80", "443:443"]
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports: ["9090:9090"]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.5
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports: ["3000:3000"]
    depends_on: [prometheus]
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    privileged: true
    ports: ["8082:8080"]
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    env_file: [.env.production]
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable"
    ports: ["9187:9187"]
    depends_on: [db]
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    environment:
      REDIS_ADDR: redis://redis:6379
    ports: ["9121:9121"]
    depends_on: [redis]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  grafana_data:
