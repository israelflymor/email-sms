global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['prometheus:9090']
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
  - job_name: postgres-exporter
    static_configs:
      - targets: ['postgres-exporter:9187']
  - job_name: redis-exporter
    static_configs:
      - targets: ['redis-exporter:9121']
