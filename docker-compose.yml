services:
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports: ["8000:8000"]
    volumes: [".:/app"]
    depends_on: [db, redis]

  webhook:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: uvicorn apps.webhook.main:app --host 0.0.0.0 --port 8001 --reload
    env_file: .env
    ports: ["8001:8001"]
    volumes: [".:/app"]
    depends_on: [db, redis]

  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: python -m apps.worker.worker
    env_file: .env
    volumes: [".:/app"]
    depends_on: [db, redis]

  scheduler:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: python -m apps.scheduler.main
    env_file: .env
    volumes: [".:/app"]
    depends_on: [db, redis]

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: messaging
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]

  redis:
    image: redis:7
    ports: ["6379:6379"]
